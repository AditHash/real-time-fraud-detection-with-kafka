services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: "2181"
      ZOOKEEPER_TICK_TIME: "2000"
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 20"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: "1"
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"

      # Listeners:
      # - For containers on the compose network: kafka:9092
      # - For your host machine: localhost:29092
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      # Single-broker dev settings
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 20"]
      interval: 10s
      timeout: 10s
      retries: 10

  init-kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - >
        for i in {1..30}; do
          kafka-topics --bootstrap-server kafka:9092 --list >/dev/null 2>&1 && break;
          sleep 2;
        done;
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic transactions --partitions 3 --replication-factor 1;
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic fraud_alerts --partitions 3 --replication-factor 1;
    restart: "no"

  transaction-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    depends_on:
      kafka:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      TOPIC_TRANSACTIONS: "transactions"
      HOST: "0.0.0.0"
      PORT: "8000"
    ports:
      - "8000:8000"
    command: ["python", "-m", "services.transaction_api.app"]

  alert-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    depends_on:
      kafka:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      TOPIC_FRAUD_ALERTS: "fraud_alerts"
      GROUP_ALERT_SERVICE: "alert-service"
      ALERT_DB_PATH: "/app/storage/alerts.db"
      HOST: "0.0.0.0"
      PORT: "8001"
    ports:
      - "8001:8001"
    volumes:
      - "./storage:/app/storage"
    command: ["python", "-m", "services.alert_service.app"]

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    depends_on:
      alert-service:
        condition: service_started
    environment:
      ALERT_SERVICE_URL: "http://alert-service:8001"
      HOST: "0.0.0.0"
      PORT: "8002"
    ports:
      - "8002:8002"
    command: ["python", "-m", "services.dashboard.app"]

  rule-engine:
    build:
      context: .
      dockerfile: docker/Dockerfile.consumer
    depends_on:
      kafka:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      TOPIC_TRANSACTIONS: "transactions"
      TOPIC_FRAUD_ALERTS: "fraud_alerts"
      GROUP_RULE_ENGINE: "rule-engine"
      RULE_AMOUNT_THRESHOLD: "2000"
      RULE_V14_LTE: "-8"
    command: ["python", "-m", "consumers.rule_engine.main"]

  ml-engine:
    build:
      context: .
      dockerfile: docker/Dockerfile.consumer
    depends_on:
      kafka:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      TOPIC_TRANSACTIONS: "transactions"
      TOPIC_FRAUD_ALERTS: "fraud_alerts"
      GROUP_ML_ENGINE: "ml-engine"
      MODEL_DIR: "/app/model"
    command: ["python", "-m", "consumers.ml_engine.main"]

  csv-producer:
    build:
      context: .
      dockerfile: docker/Dockerfile.producer
    profiles: ["demo"]
    depends_on:
      kafka:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      TOPIC_TRANSACTIONS: "transactions"
      DATA_PATH: "/app/data/creditcard.csv"
      PRODUCER_SLEEP_MS: "5"
      MAX_MESSAGES: "0"
    volumes:
      - "./data:/app/data:ro"
    command: ["python", "-m", "producer.csv_producer"]
